<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Number-Guess-Game</title>
  </head>
  <body>

    <div class="menu">
      <button id="playComputer">Play With Computer</button>
      <button id="playHuman">Play with Friend</button>
    </div>

    <div class="humanVsComputerContainer">
      <div class="header">
        <div class="logo">
          <img src="Logo.png" alt="Img_Logo" />
          <h4 class="logo-text">
            Player vs Computer. Therapy was expensive. 💀
          </h4>
        </div>
      </div>
      <div class="main-container">
        <div class="humanVsComputer">
          <!--Human Div-->
          <div class="human">
            <h3>Human</h3>
            <div class="line"></div>
            <div class="attempt">
              <p>Attempt</p>
              <p id="humanAttempt">0</p>
            </div>
            <div class="line"></div>
            <div class="guess">
              <span>Guesses</span>
              <p class="humanGuessList"></p>
            </div>
          </div>
          <img src="vsLogo.jpg" alt="vs" class="vslogo" />
          <!--Computer Div-->
          <div class="computer">
            <h3>Computer</h3>
            <div class="line"></div>
            <div class="attempt">
              <p>Attempt</p>
              <p id="compAttempt">0</p>
            </div>
            <div class="line"></div>
            <div class="guess">
              <span>Guesses</span>
              <p class="compGuessList"></p>
            </div>
          </div>
        </div>
        <!--number guess input and turn heading -->
        <div class="turnAndGuess">
          <div class="turn">
            <p class="turnHead">CURRENT TURN</p>
            <p class="whosTurn">YOUR TURN</p>
          </div>
          <div class="guessNumber">
            <input
              type="text"
              name="guessNumInp"
              id="guessNumInp"
              placeholder="Enter Your Guess (1-100)"
            />
            <button class="guessBtn">GUESS</button>
          </div>
        </div>
        <div class="hint">
          <div class="bulb"><i class="fa-regular fa-lightbulb"></i></div>
          <div class="hintbox">
            <p class="headHint">Hint :</p>
            <p class="hintText">🤔Let The Game Begin</p>
          </div>
        </div>
        <div class="winner-container">
          <div class="winIcon"><i class="fa-solid fa-trophy"></i></div>
          <div class="winnerHead">
            <p>Winner</p>
            <p class="winner">No One Wins Yet!!</p>
          </div>
        </div>
      </div>
      <div class="footer">
        <div class="reset">
          <button id="reset">RESET</button>
        </div>
      </div>
    </div>

    <div class="humanVsHumanContainer">
      <p>Iam Human Vs Human</p>
    </div>


    <script src="fullGame.js"></script>
  </body>
</html>
